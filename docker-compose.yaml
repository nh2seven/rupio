services:

  # ── ezbookkeeping ────────────────────────────────────────────────────────────
  ezbookkeeping:
    image: mayswind/ezbookkeeping:latest
    container_name: ezbookkeeping
    restart: unless-stopped
    ports:
      - "127.0.0.1:7777:8080"
    volumes:
      - ./ebk/data:/ezbookkeeping/data
      - ./ebk/storage:/ezbookkeeping/storage
    environment:
      - EBK_SERVER_DOMAIN=localhost
      - EBK_SERVER_PORT=8080
      - EBK_SECURITY_SECRET_KEY=${EBK_SECRET_KEY}
      - EBK_DATABASE_TYPE=sqlite3
      - EBK_LOG_MODE=file
      - EBK_LOG_PATH=/ezbookkeeping/data/logs
      - EBK_SERVER_ENABLE_API_TOKEN=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rupio

  # ── n8n ──────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - ./n8n/data:/home/node/.n8n
      - ./n8n/backups:/backups
      - ./docs/scripts:/scripts
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_N8N_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_LOG_LEVEL=warn
      - WEBHOOK_URL=http://localhost:5678
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rupio

  # ── Postgres ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    volumes:
      - ./db:/docker-entrypoint-initdb.d
      - ./db/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
      - POSTGRES_DB=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rupio

  # ── Backup (pg_dump + rclone → Google Drive) ─────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: rupio-backup
    restart: unless-stopped
    volumes:
      - ./n8n/backups:/backups
      - ./ebk/data:/backups/ebk-source:ro
      - ./rclone:/root/.config/rclone
      - ./docs/scripts:/scripts
    environment:
      - PGPASSWORD=${POSTGRES_ADMIN_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=admin
      - RCLONE_REMOTE=${RCLONE_REMOTE:-gdrive:rupio-backups}
      - BACKUP_RETAIN_DAYS=30
    entrypoint: >
      sh -c "
        apk add --no-cache rclone dcron &&
        echo '0 3 * * * /scripts/backup.sh >> /backups/backup.log 2>&1' | crontab - &&
        crond -f
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rupio

networks:
  rupio:
    driver: bridge